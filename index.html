<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboBhai 🤖</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --border: #0ff3;
    --accent: #00f5ff;
    --accent2: #ff006e;
    --green: #00ff88;
    --text: #c8e8f0;
    --muted: #4a7a8a;
    --bot-bg: #001020;
    --glow: 0 0 20px #00f5ff44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* SETUP SCREEN */
  #setup-screen {
    position: fixed;
    inset: 0;
    background: #050a0fee;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  .setup-box {
    background: linear-gradient(135deg, #0a1520, #0d1f30);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 36px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 0 60px #00f5ff22;
    text-align: center;
  }

  .setup-box .icon { font-size: 52px; margin-bottom: 14px; animation: float 3s ease-in-out infinite; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .setup-box h2 {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
    margin-bottom: 6px;
    letter-spacing: 2px;
  }

  .badge {
    display: inline-block;
    background: #00ff8822;
    border: 1px solid var(--green);
    color: var(--green);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 18px;
    letter-spacing: 1px;
  }

  .setup-box p {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 22px;
    line-height: 1.7;
  }

  .setup-box p a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
  }

  .setup-box input {
    width: 100%;
    background: #020810;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--accent);
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .setup-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 15px #00f5ff33;
  }

  .setup-box input::placeholder { color: var(--muted); letter-spacing: 0; }

  .btn-start {
    width: 100%;
    background: linear-gradient(135deg, #00f5ff22, #00f5ff44);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 13px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
    text-shadow: 0 0 10px var(--accent);
  }

  .btn-start:hover {
    background: linear-gradient(135deg, #00f5ff44, #00f5ff66);
    box-shadow: 0 0 25px #00f5ff55;
    transform: translateY(-1px);
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    background: linear-gradient(135deg, #070f1a, #0d1f30);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 30px #00f5ff22;
  }

  .robot-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #001a2e, #00f5ff22);
    border: 2px solid var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: var(--glow);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px #00f5ff44; }
    50% { box-shadow: 0 0 25px #00f5ffaa; }
  }

  .header-info h1 {
    font-family: 'Orbitron', monospace;
    font-size: 17px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 20px var(--accent);
  }

  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted); letter-spacing: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* CHAT */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  .message {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
    animation: slideIn 0.3s ease-out;
    max-width: 85%;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .avatar.bot { background: #001a2e; border-color: var(--accent); box-shadow: 0 0 10px #00f5ff33; }
  .avatar.user { background: #1a0020; border-color: var(--accent2); box-shadow: 0 0 10px #ff006e33; }

  .bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
  }

  .bubble.bot {
    background: var(--bot-bg);
    border: 1px solid #00f5ff22;
    border-top-left-radius: 4px;
  }

  .bubble.user {
    background: linear-gradient(135deg, #1a0028, #0d0018);
    border: 1px solid #ff006e33;
    border-top-right-radius: 4px;
    color: #f0c8e8;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .welcome .big-icon { font-size: 58px; margin-bottom: 14px; animation: float 3s ease-in-out infinite; }

  .welcome h2 {
    font-family: 'Orbitron', monospace;
    font-size: 19px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .welcome p { font-size: 13px; line-height: 1.7; }

  .typing {
    display: flex; gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }

  .typing span {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing-dot 1.2s infinite;
    box-shadow: 0 0 6px var(--accent);
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-dot {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  /* INPUT */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 14px 20px;
    background: linear-gradient(135deg, #070f1a, #0d1f30);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: #020810;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  #user-input:focus { border-color: var(--accent); box-shadow: 0 0 15px #00f5ff22; }
  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #00f5ff22, #00f5ff44);
    border: 1px solid var(--accent);
    border-radius: 12px;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  #send-btn:hover { background: linear-gradient(135deg, #00f5ff44, #00f5ff66); box-shadow: 0 0 20px #00f5ff55; transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .footer-text {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    padding: 5px 0 2px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="setup-box">
    <div class="icon">🤖</div>
    <h2>ROBOBHAI</h2>
    <div class="badge">✅ সম্পূর্ণ ফ্রি — Groq AI</div>
    <p>আপনার <strong style="color:var(--accent)">Groq API Key</strong> দিন।<br>
    ফ্রিতে পাবেন 👉 <a href="https://console.groq.com" target="_blank">console.groq.com</a></p>
    <input type="password" id="api-key-input" placeholder="gsk_..." autocomplete="off">
    <button class="btn-start" onclick="startChat()">⚡ ACTIVATE ROBOBHAI</button>
  </div>
</div>

<!-- Header -->
<header>
  <div class="robot-icon">🤖</div>
  <div class="header-info">
    <h1>ROBOBHAI</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span>ONLINE — POWERED BY GROQ (FREE)</span>
    </div>
  </div>
  <button onclick="resetKey()" style="margin-left:auto;background:transparent;border:1px solid #0ff3;color:var(--muted);font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;letter-spacing:1px;">🔑 KEY</button>
</header>

<!-- Chat -->
<div id="chat-area">
  <div class="welcome">
    <div class="big-icon">🤖</div>
    <h2>আমি RoboBhai!</h2>
    <p>আপনার AI বন্ধু — সম্পূর্ণ ফ্রি!<br>যেকোনো প্রশ্ন করুন, উত্তর দিতে প্রস্তুত! 💬</p>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <textarea id="user-input" placeholder="RoboBhai-কে কিছু জিজ্ঞেস করুন..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()">➤</button>
</div>
<div class="footer-text">Powered by Groq AI · RoboBhai v2.0 · FREE ✅</div>

<script>
  let API_KEY = "";
  let messages = [];

  // পুরনো key আছে কিনা চেক করো
  window.onload = function() {
    const saved = localStorage.getItem("robobhai_key");
    if (saved) {
      API_KEY = saved;
      document.getElementById("setup-screen").style.display = "none";
      document.getElementById("user-input").focus();
    }
  };

  function startChat() {
    const key = document.getElementById("api-key-input").value.trim();
    if (!key) {
      alert("API Key দিন!");
      return;
    }
    API_KEY = key;
    localStorage.setItem("robobhai_key", key); // browser-এ save করো
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("user-input").focus();
  }

  function resetKey() {
    localStorage.removeItem("robobhai_key");
    location.reload();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function addMessage(role, text) {
    const chat = document.getElementById("chat-area");
    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    const div = document.createElement("div");
    div.className = `message ${role}`;

    const avatar = role === "bot" ? "🤖" : "👤";
    const avatarClass = role === "bot" ? "bot" : "user";

    div.innerHTML = `
      <div class="avatar ${avatarClass}">${avatar}</div>
      <div class="bubble ${role}">${text.replace(/\n/g, "<br>")}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById("chat-area");
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing-indicator";
    div.innerHTML = `
      <div class="avatar bot">🤖</div>
      <div class="bubble bot">
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const btn = document.getElementById("send-btn");
    const text = input.value.trim();
    if (!text || btn.disabled) return;

    input.value = "";
    input.style.height = "auto";
    btn.disabled = true;

    addMessage("user", text);
    messages.push({ role: "user", content: text });

    showTyping();

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          max_tokens: 1000,
          messages: [
            {
              role: "system",
              content: `তুমি RoboBhai — একটি বন্ধুসুলভ বাংলা AI সহকারী।
নিয়ম:
- সবসময় বাংলায় কথা বলবে
- সহজ ও বন্ধুসুলভ ভাষা ব্যবহার করবে
- উত্তর ছোট ও কার্যকর রাখবে
- মাঝে মাঝে ইমোজি ব্যবহার করবে`
            },
            ...messages
          ]
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.choices && data.choices[0]) {
        const reply = data.choices[0].message.content;
        messages.push({ role: "assistant", content: reply });
        addMessage("bot", reply);
      } else if (data.error) {
        addMessage("bot", `❌ Error: ${data.error.message}`);
      }
    } catch (err) {
      removeTyping();
      addMessage("bot", "❌ সংযোগে সমস্যা। API Key চেক করুন।");
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
